<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>For Yeganeh ✨</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="background"></div>

<header class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>✨ برای یگانه ✨</h1>

        <p>
            بعضی هدیه‌ها خریدنی نیستند...
            <br>
            فقط باید کشف شوند.
        </p>

        <button id="startBtn" class="btn">
            شروع
        </button>

    </div>

</header>

<section id="starsSection" class="hidden">

    <h2>🌌 آسمان رازها</h2>

    <p class="subtitle">
        هر ستاره یک راز است...
        <br>
        اگر کدش را بدانی.
    </p>

    <div id="starsContainer"></div>

</section>

<div id="codeModal" class="modal hidden">

    <div class="modal-box">

        <h2>⭐ ورود به ستاره</h2>

        <p>کد مخصوص این ستاره را وارد کن.</p>

        <input
            id="codeInput"
            type="password"
            placeholder="کد..."
        >

        <button id="checkCode">
            ورود
        </button>

        <button id="closeModal">
            بستن
        </button>

    </div>

</div>

<div id="contentModal" class="modal hidden">

    <div class="modal-box">

        <button id="closeContent">
            ✖
        </button>

        <div id="contentArea">

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
