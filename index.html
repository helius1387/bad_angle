<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bad Angle</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="background"></div>

    <header class="hero">

        <div class="overlay"></div>

        <div class="hero-content">

            <h1>BAD ANGLE</h1>

            <p>
                گاهی حقیقت از زاویه‌ای دیده می‌شود
                که هیچ‌کس جرئت نگاه کردن به آن را ندارد.
            </p>

            <a href="#about" class="btn">
                شروع
            </a>

        </div>

    </header>

    <section id="about" class="about">

        <div class="container">

            <h2>یگانه</h2>

            <p>
                این فقط یک سایت نیست...
                این جاییه برای روایت،
                برای موسیقی،
                برای احساس،
                و برای نگاه کردن از زاویه‌ای متفاوت.
            </p>

        </div>

    </section>

    <section class="gallery">

        <div class="container">

            <h2>آخرین تصاویر</h2>

            <div class="cards">

                <div class="card"></div>

                <div class="card"></div>

                <div class="card"></div>

            </div>

        </div>

    </section>

    <section class="music">

        <div class="container">

            <h2>Music</h2>

            <button id="playBtn">
                پخش موزیک
            </button>

        </div>

    </section>

    <footer>

        <p>
            © BAD ANGLE
        </p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
